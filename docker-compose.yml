version: "3.9"

services:

  mongodb:
    image: mongo:6.0
    container_name: mean_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: dd_db
    volumes:
      - mongo_data:/data/db
    networks:
      - mean_network

  backend:
    image: abhiii2211/mean-backend:latest
    container_name: mean_backend
    restart: unless-stopped
    environment:
      PORT: 8080
      MONGO_URL: mongodb://mongodb:27017/dd_db
    depends_on:
      - mongodb
    networks:
      - mean_network

  frontend:
    image: abhiii2211/mean-frontend:latest
    container_name: mean_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - mean_network

  nginx:
    image: nginx:1.25-alpine
    container_name: mean_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - mean_network

volumes:
  mongo_data:
    driver: local

networks:
  mean_network:
    driver: bridge
